name: QA On Demand V2

on:
  workflow_dispatch:
    inputs:
      trigger_user:
        description: 'User who triggered the workflow'
        required: false
        type: string
      trigger_source:
        description: 'Source of the trigger (web/app)'
        required: false
        type: string

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: WORKFLOW_MARKER_V2
        run: |
          echo "WORKFLOW_MARKER_V2: updated-no-setup-node-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "COMMIT:"; git rev-parse --short HEAD || echo "no-commit"

      - name: Debug workspace (list files)
        run: |
          echo "PWD: $(pwd)"
          echo "Node: $(node -v || echo 'node not found')";
          echo "NPM: $(npm -v || echo 'npm not found')";
          echo "Listing root files:"; ls -la
          echo "Listing repo tree:"; find . -maxdepth 3 -type f -print | sed -n '1,200p'

      - name: Locate package.json
        id: find_pkg
        run: |
          pkg=$(find . -maxdepth 4 -name package.json | head -n 1 || true)
          if [ -z "$pkg" ]; then
            echo "PACKAGE_DIR=." >> $GITHUB_ENV
            echo "No package.json found in repository root or subfolders (depth 4). Using project root.";
          else
            dir=$(dirname "$pkg")
            echo "PACKAGE_DIR=$dir" >> $GITHUB_ENV
            echo "Found package.json in $dir";
          fi
          echo "--- files at PACKAGE_DIR ---"; ls -la "$PACKAGE_DIR" || true
          echo "--- package.json content ---"; cat "$PACKAGE_DIR/package.json" || true

      - name: Install dependencies (verbose)
        run: |
          echo "Installing dependencies in $PACKAGE_DIR"
          echo "npm --version: $(npm --version)";
          echo "node --version: $(node --version)";
          echo "npm registry: $(npm --prefix "$PACKAGE_DIR" config get registry)";
          if [ -f "$PACKAGE_DIR/package-lock.json" ]; then
            echo "Found package-lock.json — running npm ci (verbose)"
            npm --prefix "$PACKAGE_DIR" ci --loglevel=verbose || (echo "npm ci failed with exit $?"; ls -la "$PACKAGE_DIR"; cat "$PACKAGE_DIR/package.json" || true; exit 1)
          else
            echo "No lockfile — running npm install (verbose)"
            npm --prefix "$PACKAGE_DIR" install --loglevel=verbose || (echo "npm install failed with exit $?"; ls -la "$PACKAGE_DIR"; cat "$PACKAGE_DIR/package.json" || true; exit 1)
          fi

      - name: Quick smoke test
        run: |
          echo "If this finishes, install succeeded"


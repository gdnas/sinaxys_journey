name: QA On Demand

on:
  workflow_dispatch:
    inputs:
      trigger_user:
        description: 'User who triggered the workflow'
        required: false
        type: string
      trigger_source:
        description: 'Source of the trigger (web/app)'
        required: false
        type: string

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug workspace (list files)
        run: |
          echo "PWD: $(pwd)"
          echo "Node: $(node -v)";
          echo "NPM: $(npm -v)";
          echo "Listing root files:"; ls -la
          echo "Listing src files:"; ls -la src || true

      - name: Locate package.json
        id: find_pkg
        run: |
          pkg=$(find . -maxdepth 4 -name package.json | head -n 1 || true)
          if [ -z "$pkg" ]; then
            echo "PACKAGE_DIR=." >> $GITHUB_ENV
            echo "No package.json found in repository root or subfolders (depth 4). Using project root.";
          else
            dir=$(dirname "$pkg")
            echo "PACKAGE_DIR=$dir" >> $GITHUB_ENV
            echo "Found package.json in $dir";
          fi
          echo "--- files at PACKAGE_DIR ---"; ls -la "$PACKAGE_DIR" || true
          echo "--- package.json content ---"; cat "$PACKAGE_DIR/package.json" || true

      - name: Install dependencies (verbose)
        run: |
          echo "Installing dependencies in $PACKAGE_DIR"
          echo "npm registry: $(npm --prefix "$PACKAGE_DIR" config get registry)";
          # prefer npm ci when lockfile exists
          if [ -f "$PACKAGE_DIR/package-lock.json" ]; then
            echo "Found package-lock.json — running npm ci (verbose)"
            npm --prefix "$PACKAGE_DIR" ci --loglevel=verbose || (echo "npm ci failed with exit $?"; ls -la "$PACKAGE_DIR"; cat "$PACKAGE_DIR/package.json" || true; exit 1)
          else
            echo "No lockfile — running npm install (verbose)"
            npm --prefix "$PACKAGE_DIR" install --loglevel=verbose || (echo "npm install failed with exit $?"; ls -la "$PACKAGE_DIR"; cat "$PACKAGE_DIR/package.json" || true; exit 1)
          fi

      - name: Run Lint
        run: |
          echo "Running lint in $PACKAGE_DIR"
          npm --prefix "$PACKAGE_DIR" run lint

      - name: Run Type Check
        run: |
          echo "Running typecheck in $PACKAGE_DIR"
          npm --prefix "$PACKAGE_DIR" run typecheck

      - name: Run Unit Tests
        run: |
          echo "Running unit tests in $PACKAGE_DIR"
          npm --prefix "$PACKAGE_DIR" run test

      - name: Install Playwright Browsers
        run: |
          echo "Installing Playwright browsers"
          npx playwright install --with-deps

      - name: Run E2E Tests
        run: |
          echo "Running E2E tests in $PACKAGE_DIR"
          npm --prefix "$PACKAGE_DIR" run e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            vitest-coverage/
          retention-days: 30